<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mubet Trial DevTools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0c13; color: #f5f7fb; padding: 24px; min-height: 100vh;
}
h1 { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 24px; color: #ca2930; }
h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #9aa3b2; margin-bottom: 12px; }
section { background: #11131c; border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.preset-btn {
  padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04); color: #f5f7fb; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s; text-align: left;
}
.preset-btn:hover { border-color: #ca2930; background: rgba(222,46,54,.06); }
.preset-btn.active { border-color: #ca2930; background: rgba(222,46,54,.1); }
.preset-btn-title { font-weight: 700; margin-bottom: 2px; }
.preset-btn-desc { font-size: 10px; color: #9aa3b2; }
.field { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.field label { font-size: 12px; flex: 1; cursor: pointer; }
.field input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: #05a158; cursor: pointer;
}
.field input[type="range"] { flex: 1; accent-color: #ca2930; }
.field-value { font-size: 12px; font-weight: 700; color: #ffe23e; min-width: 40px; text-align: right; }
.actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-apply {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  background: #ca2930; color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.btn-apply:hover { background: #e63946; }
.btn-apply.applied { background: #05a158; }
@keyframes applyFlash { 0% { box-shadow: 0 0 0 0 rgba(5,161,88,.5); } 100% { box-shadow: 0 0 0 12px rgba(5,161,88,0); } }
.btn-reset {
  padding: 12px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15);
  background: transparent; color: #9aa3b2; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.btn-reset:hover { border-color: #ca2930; color: #f5f7fb; }
.status { margin-top: 16px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,.03); font-size: 11px; color: #9aa3b2; }
.status strong { color: #ffe23e; }
</style>
</head>
<body>

<h1>&#9881; VIP1 Trial DevTools</h1>

<section>
  <h2>Quick States</h2>
  <div class="preset-grid">
    <button class="preset-btn" onclick="setPreset(1)">
      <div class="preset-btn-title">State 1: Fresh</div>
      <div class="preset-btn-desc">0/4 conditions, no progress</div>
    </button>
    <button class="preset-btn" onclick="setPreset(2)">
      <div class="preset-btn-title">State 2: Partial</div>
      <div class="preset-btn-desc">Phone + Telegram done, 2/3 days</div>
    </button>
    <button class="preset-btn" onclick="setPreset(3)">
      <div class="preset-btn-title">State 3: All Complete</div>
      <div class="preset-btn-desc">4/4 done, ready to activate</div>
    </button>
    <button class="preset-btn" onclick="setPreset(4)">
      <div class="preset-btn-title">State 4: Trial Active</div>
      <div class="preset-btn-desc">Activated, 5 days remaining</div>
    </button>
    <button class="preset-btn" onclick="setPreset(5)">
      <div class="preset-btn-title">State 5: Ending Soon</div>
      <div class="preset-btn-desc">Activated, 12 hours remaining</div>
    </button>
    <button class="preset-btn" onclick="setPreset(6)">
      <div class="preset-btn-title">State 6: Almost Done</div>
      <div class="preset-btn-desc">3/4 done, 1/3 active days</div>
    </button>
  </div>
</section>

<section>
  <h2>Conditions</h2>
  <div class="field">
    <input type="checkbox" id="phone">
    <label for="phone">&#128241; Phone verified</label>
  </div>
  <div class="field">
    <input type="checkbox" id="telegram">
    <label for="telegram">&#9992; Telegram connected</label>
  </div>
  <div class="field">
    <input type="checkbox" id="deposit">
    <label for="deposit">&#128176; First deposit done</label>
  </div>
  <div class="field">
    <label>&#128197; Active days:</label>
    <input type="range" id="activeDays" min="0" max="3" value="0" oninput="document.getElementById('activeDaysVal').textContent=this.value+'/3'">
    <div class="field-value" id="activeDaysVal">0/3</div>
  </div>
</section>

<section>
  <h2>Trial</h2>
  <div class="field">
    <input type="checkbox" id="activated">
    <label for="activated">Trial activated</label>
  </div>
  <div class="field">
    <label>Time remaining:</label>
    <input type="range" id="timeLeft" min="0" max="168" value="168" oninput="updateTimeDisplay()">
    <div class="field-value" id="timeLeftVal">7d 0h</div>
  </div>
  <div class="actions">
    <button class="btn-apply" onclick="applyState()">Apply State</button>
    <button class="btn-reset" onclick="resetState()">Reset</button>
  </div>
  <div class="status" id="statusText">Ready. Open mubet-vip-prototype.html in another tab.</div>
</section>

<script>
function updateTimeDisplay() {
  const h = parseInt(document.getElementById('timeLeft').value);
  const d = Math.floor(h / 24);
  const hr = h % 24;
  document.getElementById('timeLeftVal').textContent = `${d}d ${hr}h`;
}

function buildState() {
  const hours = parseInt(document.getElementById('timeLeft').value);
  const activated = document.getElementById('activated').checked;
  return {
    phone: document.getElementById('phone').checked,
    telegram: document.getElementById('telegram').checked,
    deposit: document.getElementById('deposit').checked,
    activeDays: parseInt(document.getElementById('activeDays').value),
    activated: activated,
    activatedAt: activated ? Date.now() - ((168 - hours) * 60 * 60 * 1000) : null,
    expiresAt: activated ? Date.now() + (hours * 60 * 60 * 1000) : null
  };
}

function applyState() {
  const state = buildState();
  localStorage.setItem('mubet_trial_state', JSON.stringify(state));
  updateStatus(state);

  // Highlight active preset
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));

  // Flash feedback
  const btn = document.querySelector('.btn-apply');
  btn.classList.add('applied');
  btn.textContent = 'Applied!';
  btn.style.animation = 'applyFlash .5s ease';
  setTimeout(() => {
    btn.classList.remove('applied');
    btn.textContent = 'Apply State';
    btn.style.animation = '';
  }, 1200);
}

function resetState() {
  const state = { phone: false, telegram: false, deposit: false, activeDays: 0, activated: false, activatedAt: null, expiresAt: null };
  localStorage.setItem('mubet_trial_state', JSON.stringify(state));
  syncUI(state);
  updateStatus(state);
}

function setPreset(n) {
  let state = { phone: false, telegram: false, deposit: false, activeDays: 0, activated: false, activatedAt: null, expiresAt: null };

  switch(n) {
    case 1: break; // fresh
    case 2: state.phone = true; state.telegram = true; state.activeDays = 2; break;
    case 3: state.phone = true; state.telegram = true; state.deposit = true; state.activeDays = 3; break;
    case 4:
      state.phone = true; state.telegram = true; state.deposit = true; state.activeDays = 3;
      state.activated = true; state.activatedAt = Date.now() - 2*24*60*60*1000;
      state.expiresAt = Date.now() + 5*24*60*60*1000;
      break;
    case 5:
      state.phone = true; state.telegram = true; state.deposit = true; state.activeDays = 3;
      state.activated = true; state.activatedAt = Date.now() - 6.5*24*60*60*1000;
      state.expiresAt = Date.now() + 12*60*60*1000;
      break;
    case 6:
      state.phone = true; state.telegram = true; state.deposit = true; state.activeDays = 1;
      break;
  }

  localStorage.setItem('mubet_trial_state', JSON.stringify(state));
  syncUI(state);
  updateStatus(state);

  // Highlight preset
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Flash status
  const statusEl = document.getElementById('statusText');
  statusEl.style.transition = 'background .15s';
  statusEl.style.background = 'rgba(5,161,88,.15)';
  setTimeout(() => { statusEl.style.background = ''; }, 800);
}

function syncUI(state) {
  document.getElementById('phone').checked = state.phone;
  document.getElementById('telegram').checked = state.telegram;
  document.getElementById('deposit').checked = state.deposit;
  document.getElementById('activeDays').value = state.activeDays;
  document.getElementById('activeDaysVal').textContent = state.activeDays + '/3';
  document.getElementById('activated').checked = state.activated;

  if (state.activated && state.expiresAt) {
    const hours = Math.max(0, Math.round((state.expiresAt - Date.now()) / (60*60*1000)));
    document.getElementById('timeLeft').value = hours;
    updateTimeDisplay();
  } else {
    document.getElementById('timeLeft').value = 168;
    updateTimeDisplay();
  }
}

function updateStatus(state) {
  const count = (state.phone?1:0) + (state.telegram?1:0) + (state.deposit?1:0) + (state.activeDays>=3?1:0);
  let phase = 1;
  if (state.activated && state.expiresAt) {
    const rem = state.expiresAt - Date.now();
    if (rem <= 0) phase = 1;
    else if (rem <= 24*60*60*1000) phase = 5;
    else phase = 4;
  } else if (count === 4) phase = 3;
  else if (count > 0) phase = 2;

  document.getElementById('statusText').innerHTML =
    `Applied! Phase: <strong>${phase}</strong> | Conditions: <strong>${count}/4</strong> | ` +
    (state.activated ? `Trial: <strong>Active</strong>` : `Trial: Inactive`);
}

// Load existing state on page load
try {
  const saved = localStorage.getItem('mubet_trial_state');
  if (saved) {
    const state = JSON.parse(saved);
    syncUI(state);
    updateStatus(state);
  }
} catch(e) {}
</script>
</body>
</html>
